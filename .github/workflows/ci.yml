name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  backend:
    name: Backend
    runs-on: ubuntu-latest
    env:
      SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5435/watchtower
      SPRING_DATASOURCE_USERNAME: watchtower
      SPRING_DATASOURCE_PASSWORD: watchtower_dev

    services:
      postgres:
        image: postgres:16
        ports:
          - 5435:5432
        env:
          POSTGRES_DB: watchtower
          POSTGRES_USER: watchtower
          POSTGRES_PASSWORD: watchtower_dev
        options: >-
          --health-cmd "pg_isready -U watchtower -d watchtower"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Test backend
        working-directory: backend
        run: mvn -B test

  frontend:
    name: Frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Test frontend
        working-directory: frontend
        run: npm test
