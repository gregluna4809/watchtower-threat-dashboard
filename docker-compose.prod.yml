services:
  postgres:
    image: postgres:16
    container_name: watchtower-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${WATCHTOWER_DB_NAME:-watchtower}
      POSTGRES_USER: ${WATCHTOWER_DB_USER:-watchtower}
      POSTGRES_PASSWORD: ${WATCHTOWER_DB_PASSWORD:?WATCHTOWER_DB_PASSWORD is required}
    volumes:
      - watchtower_pgdata:/var/lib/postgresql/data
    networks:
      - default

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: watchtower-backend
    restart: unless-stopped
    depends_on:
      - postgres
    environment:
      SERVER_ADDRESS: 0.0.0.0
      SPRING_PROFILES_ACTIVE: prod
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${WATCHTOWER_DB_NAME:-watchtower}
      SPRING_DATASOURCE_USERNAME: ${WATCHTOWER_DB_USER:-watchtower}
      SPRING_DATASOURCE_PASSWORD: ${WATCHTOWER_DB_PASSWORD:?WATCHTOWER_DB_PASSWORD is required}
      ABUSEIPDB_API_KEY: ${ABUSEIPDB_API_KEY:-}
      WATCHTOWER_OBSERVER_TOKEN: ${WATCHTOWER_OBSERVER_TOKEN:-}
    expose:
      - "8088"
    networks:
      - default
      - edge

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: watchtower-frontend
    restart: unless-stopped
    depends_on:
      - backend
    expose:
      - "80"
    networks:
      - edge

  host-observer:
    profiles:
      - host-observer
    build:
      context: ./host-observer
      dockerfile: Dockerfile
    container_name: watchtower-host-observer
    restart: unless-stopped
    depends_on:
      - backend
    read_only: true
    cap_drop:
      - ALL
    cap_add:
      - SYS_ADMIN
    security_opt:
      - no-new-privileges:true
    pid: host
    volumes:
      - /proc:/host/proc:ro
    environment:
      WATCHTOWER_BACKEND_URL: http://watchtower-backend:8088/internal/v1/host-snapshots
      WATCHTOWER_OBSERVER_TOKEN: ${WATCHTOWER_OBSERVER_TOKEN:-}
      WATCHTOWER_OBSERVER_INTERVAL_SECONDS: ${WATCHTOWER_OBSERVER_INTERVAL_SECONDS:-3}
      WATCHTOWER_SS_COMMAND: nsenter --net=/host/proc/1/ns/net ss -tunap
    networks:
      - default

volumes:
  watchtower_pgdata:
    name: watchtower_pgdata

networks:
  edge:
    external: true
    name: edge
