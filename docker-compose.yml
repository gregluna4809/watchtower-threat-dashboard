services:
  postgres:
    image: postgres:16
    container_name: watchtower-postgres
    ports:
      - "5435:5432"
    environment:
      POSTGRES_DB: watchtower
      POSTGRES_USER: watchtower
      POSTGRES_PASSWORD: watchtower_dev
    volumes:
      - watchtower_pgdata:/var/lib/postgresql/data

volumes:
  watchtower_pgdata:
    name: watchtower_pgdata
